name: Coldcalllog
options:
  bundleIdPrefix: com.shimondeitel.coldcalllog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Coldcalllog:
    type: application
    platform: iOS
    sources:
      - path: Coldcalllog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldcalllog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Coldcalllog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ColdcalllogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ColdcalllogTests
      - path: Coldcalllog.storekit
    dependencies:
      - target: Coldcalllog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldcalllog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ColdcalllogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ColdcalllogUITests
    dependencies:
      - target: Coldcalllog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.coldcalllog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Coldcalllog:
    build:
      targets:
        Coldcalllog: all
        ColdcalllogTests: [test]
        ColdcalllogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Coldcalllog.storekit
    test:
      config: Debug
      storeKitConfiguration: Coldcalllog.storekit
      targets:
        - ColdcalllogTests
        - ColdcalllogUITests
    archive:
      config: Release
